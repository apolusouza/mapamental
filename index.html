<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MindMap Studio</title>
<style>
  :root {
    --bg-primary: #0f1117;
    --bg-secondary: #1a1d2e;
    --bg-tertiary: #252840;
    --bg-card: #1e2139;
    --text-primary: #e0e0e0;
    --text-secondary: #8b8fa3;
    --text-muted: #555a7a;
    --accent: #6c5ce7;
    --accent-hover: #7d6ff0;
    --accent-glow: rgba(108, 92, 231, 0.3);
    --node-blue: #5b9aff;
    --node-orange: #ffa845;
    --node-green: #51cf66;
    --node-red: #ff6b6b;
    --node-purple: #cc5de8;
    --node-yellow: #ffd43b;
    --border: #2a2d42;
    --shadow: rgba(0,0,0,0.4);
    --danger: #ff4757;
    --success: #2ed573;
    --warning: #ffa502;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    touch-action: none;
  }

  #app {
    display: flex;
    height: 100vh;
    width: 100vw;
    position: relative;
  }

  /* Sidebar */
  .sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    z-index: 100;
    transition: transform 0.3s ease;
  }

  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .sidebar-header h1 {
    font-size: 18px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--node-blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .sidebar-header .logo {
    width: 28px;
    height: 28px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  .sidebar-actions {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .btn {
    padding: 8px 12px;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s ease;
    font-family: inherit;
    color: var(--text-primary);
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
  }

  .btn:hover { background: var(--accent); border-color: var(--accent); }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .btn-primary:hover { background: var(--accent-hover); }

  .btn-danger { color: var(--danger); }
  .btn-danger:hover { background: var(--danger); color: white; }

  .btn-small {
    padding: 4px 8px;
    font-size: 11px;
  }

  .btn-icon {
    width: 32px;
    height: 32px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    font-size: 16px;
  }

  .folders-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .folders-list::-webkit-scrollbar { width: 4px; }
  .folders-list::-webkit-scrollbar-track { background: transparent; }
  .folders-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .folder-item {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: all 0.2s;
    margin-bottom: 2px;
    user-select: none;
  }

  .folder-item:hover { background: var(--bg-tertiary); }
  .folder-item.active { background: var(--accent); color: white; }
  .folder-item.active .folder-count { color: rgba(255,255,255,0.7); }

  .folder-name {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 0;
  }

  .folder-icon { font-size: 16px; flex-shrink: 0; }

  .folder-label {
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .folder-count {
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .folder-actions {
    display: flex;
    gap: 2px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .folder-item:hover .folder-actions { opacity: 1; }
  .folder-item.active .folder-actions { opacity: 1; }

  .folder-actions button {
    background: none;
    border: none;
    color: inherit;
    cursor: pointer;
    padding: 2px 4px;
    font-size: 12px;
    opacity: 0.6;
    border-radius: 4px;
  }
  .folder-actions button:hover { opacity: 1; background: rgba(255,255,255,0.1); }

  .sidebar-footer {
    padding: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 6px;
  }

  .sidebar-footer .btn { flex: 1; justify-content: center; font-size: 12px; }

  /* Canvas Area */
  .canvas-area {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--bg-primary);
  }

  .canvas-bg {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(255,255,255,0.03) 1px, transparent 0);
    background-size: 30px 30px;
  }

  #graphCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    cursor: grab;
  }
  #graphCanvas:active { cursor: grabbing; }

  /* Toolbar */
  .toolbar {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    padding: 6px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    z-index: 50;
    box-shadow: 0 4px 20px var(--shadow);
  }

  .toolbar .btn {
    padding: 6px 10px;
    font-size: 12px;
    border-radius: 8px;
  }

  .toolbar .separator {
    width: 1px;
    background: var(--border);
    margin: 2px 4px;
  }

  /* Mobile bottom bar */
  .mobile-bar {
    display: none;
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    padding: 8px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 16px;
    z-index: 50;
    box-shadow: 0 4px 20px var(--shadow);
    gap: 4px;
  }

  .mobile-bar .btn-icon {
    width: 40px;
    height: 40px;
    font-size: 18px;
  }

  /* Node detail panel */
  .detail-panel {
    position: absolute;
    right: 12px;
    top: 60px;
    width: 260px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    z-index: 50;
    box-shadow: 0 4px 20px var(--shadow);
    padding: 16px;
    display: none;
  }

  .detail-panel.visible { display: block; }

  .detail-panel h3 {
    font-size: 14px;
    margin-bottom: 12px;
    color: var(--text-secondary);
  }

  .detail-panel input, .detail-panel textarea {
    width: 100%;
    padding: 8px 10px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-primary);
    font-size: 13px;
    font-family: inherit;
    margin-bottom: 8px;
    outline: none;
  }

  .detail-panel input:focus, .detail-panel textarea:focus {
    border-color: var(--accent);
  }

  .detail-panel textarea { resize: vertical; min-height: 60px; }

  .detail-panel .color-picker {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .color-dot {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s;
  }
  .color-dot:hover, .color-dot.selected { border-color: white; transform: scale(1.15); }

  .detail-actions {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }
  .detail-actions .btn { flex: 1; justify-content: center; }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.visible { display: flex; }

  .modal {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 60px var(--shadow);
  }

  .modal h2 {
    font-size: 18px;
    margin-bottom: 16px;
  }

  .modal input {
    width: 100%;
    padding: 10px 12px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-primary);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    margin-bottom: 16px;
  }
  .modal input:focus { border-color: var(--accent); }

  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .modal-actions .btn { padding: 8px 16px; }

  /* Toast */
  .toast-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 300;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .toast {
    padding: 10px 16px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 13px;
    box-shadow: 0 4px 15px var(--shadow);
    animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toast.success { border-left: 3px solid var(--success); }
  .toast.error { border-left: 3px solid var(--danger); }
  .toast.info { border-left: 3px solid var(--accent); }

  @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateX(20px); } }

  /* Mobile hamburger */
  .hamburger {
    display: none;
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 150;
    width: 36px;
    height: 36px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: var(--text-primary);
  }

  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 99;
  }

  /* Zoom controls */
  .zoom-controls {
    position: absolute;
    bottom: 12px;
    right: 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    z-index: 50;
  }

  .zoom-controls .btn-icon {
    width: 32px;
    height: 32px;
    font-size: 16px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-primary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .zoom-controls .btn-icon:hover { background: var(--accent); }

  .zoom-label {
    text-align: center;
    font-size: 10px;
    color: var(--text-muted);
    padding: 2px;
  }

  /* Context menu */
  .context-menu {
    position: fixed;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px;
    z-index: 250;
    box-shadow: 0 8px 30px var(--shadow);
    display: none;
    min-width: 160px;
  }
  .context-menu.visible { display: block; }

  .context-menu-item {
    padding: 8px 12px;
    font-size: 13px;
    cursor: pointer;
    border-radius: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-primary);
    transition: background 0.15s;
  }
  .context-menu-item:hover { background: var(--accent); }
  .context-menu-item.danger { color: var(--danger); }
  .context-menu-item.danger:hover { background: var(--danger); color: white; }
  .context-menu-divider { height: 1px; background: var(--border); margin: 4px 0; }

  /* Empty state */
  .empty-state {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    pointer-events: none;
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      height: 100%;
      transform: translateX(-100%);
      z-index: 200;
      width: 300px;
      min-width: 300px;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay.visible { display: block; }
    .hamburger { display: flex; }
    .mobile-bar { display: flex; }
    .toolbar { top: 60px; }
    .detail-panel {
      right: 8px;
      left: 8px;
      top: auto;
      bottom: 80px;
      width: auto;
    }
    .zoom-controls { bottom: 80px; right: 8px; }
  }

  @media (max-width: 480px) {
    .sidebar { width: 100%; min-width: 100%; }
    .toolbar { flex-wrap: wrap; max-width: 95vw; }
  }

  /* Animations */
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .saving-indicator {
    position: absolute;
    top: 12px;
    right: 12px;
    font-size: 11px;
    color: var(--text-muted);
    z-index: 50;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .saving-indicator .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--success);
    animation: pulse 2s infinite;
  }

  .search-box {
    padding: 8px 12px;
    margin: 8px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-primary);
    font-size: 13px;
    width: calc(100% - 16px);
    outline: none;
    font-family: inherit;
  }
  .search-box:focus { border-color: var(--accent); }

  .stats-bar {
    padding: 8px 12px;
    font-size: 11px;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
  }
</style>
</head>
<body>
<div id="app">
  <!-- Hamburger for mobile -->
  <button class="hamburger" id="hamburgerBtn" title="Menu">☰</button>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">🧠</div>
      <h1>MindMap Studio</h1>
    </div>
    <div class="sidebar-actions">
      <button class="btn btn-primary" onclick="createFolder()">
        <span>📁</span> Nova Pasta
      </button>
    </div>
    <input type="text" class="search-box" placeholder="Buscar pastas..." oninput="filterFolders(this.value)">
    <div class="folders-list" id="foldersList"></div>
    <div class="stats-bar" id="statsBar">
      <span id="statsNodes">0 nós</span>
      <span id="statsEdges">0 conexões</span>
    </div>
    <div class="sidebar-footer">
      <button class="btn" onclick="exportBackup()" title="Exportar Backup">
        <span>📤</span> Exportar
      </button>
      <button class="btn" onclick="importBackup()" title="Importar Backup">
        <span>📥</span> Importar
      </button>
    </div>
  </div>

  <!-- Canvas Area -->
  <div class="canvas-area" id="canvasArea">
    <div class="canvas-bg"></div>
    <canvas id="graphCanvas"></canvas>

    <!-- Toolbar -->
    <div class="toolbar" id="toolbar">
      <button class="btn" onclick="addNode()" title="Adicionar nó (N)">
        <span>➕</span> Nó
      </button>
      <button class="btn" onclick="startConnectionMode()" title="Conectar (C)">
        <span>🔗</span> Conectar
      </button>
      <div class="separator"></div>
      <button class="btn" onclick="togglePhysics()" title="Física">
        <span id="physicsIcon">⚡</span>
      </button>
      <button class="btn" onclick="centerGraph()" title="Centralizar">
        <span>🎯</span>
      </button>
      <button class="btn" onclick="exportFolderJSON()" title="Exportar mapa">
        <span>💾</span>
      </button>
    </div>

    <!-- Saving indicator -->
    <div class="saving-indicator" id="savingIndicator" style="display:none;">
      <div class="dot"></div>
      Salvando...
    </div>

    <!-- Detail Panel -->
    <div class="detail-panel" id="detailPanel">
      <h3>✏️ Editar Nó</h3>
      <input type="text" id="nodeNameInput" placeholder="Nome do nó" oninput="updateNodeName()">
      <textarea id="nodeDescInput" placeholder="Descrição (opcional)" oninput="updateNodeDesc()"></textarea>
      <label style="font-size:12px;color:var(--text-secondary);margin-bottom:6px;display:block;">Cor:</label>
      <div class="color-picker" id="colorPicker"></div>
      <div class="detail-actions">
        <button class="btn btn-danger" onclick="deleteSelectedNode()">🗑️ Excluir</button>
        <button class="btn" onclick="archiveSelectedNode()">📦 Arquivar</button>
        <button class="btn" onclick="closeDetail()">✖</button>
      </div>
    </div>

    <!-- Zoom Controls -->
    <div class="zoom-controls">
      <button class="btn-icon" onclick="zoomIn()" title="Zoom In">+</button>
      <div class="zoom-label" id="zoomLabel">100%</div>
      <button class="btn-icon" onclick="zoomOut()" title="Zoom Out">−</button>
      <button class="btn-icon" onclick="resetZoom()" title="Reset Zoom" style="font-size:12px;margin-top:4px;">⟳</button>
    </div>

    <!-- Mobile Bar -->
    <div class="mobile-bar" id="mobileBar">
      <button class="btn-icon" onclick="addNode()" title="Adicionar nó">➕</button>
      <button class="btn-icon" onclick="startConnectionMode()" title="Conectar">🔗</button>
      <button class="btn-icon" onclick="togglePhysics()" title="Física">⚡</button>
      <button class="btn-icon" onclick="centerGraph()" title="Centralizar">🎯</button>
      <button class="btn-icon" onclick="openSidebar()" title="Pastas">📁</button>
    </div>

    <!-- Empty state -->
    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="icon">🗺️</div>
      <p>Selecione uma pasta ou crie uma nova</p>
    </div>
  </div>

  <!-- Context Menu -->
  <div class="context-menu" id="contextMenu">
    <div class="context-menu-item" onclick="contextEditNode()">✏️ Editar</div>
    <div class="context-menu-item" onclick="contextAddChild()">➕ Adicionar filho</div>
    <div class="context-menu-item" onclick="contextDuplicate()">📋 Duplicar</div>
    <div class="context-menu-divider"></div>
    <div class="context-menu-item" onclick="contextArchiveNode()">📦 Arquivar</div>
    <div class="context-menu-item danger" onclick="contextDeleteNode()">🗑️ Excluir</div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <h2 id="modalTitle">Título</h2>
      <input type="text" id="modalInput" placeholder="Digite aqui...">
      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" id="modalConfirm">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Hidden file input for import -->
  <input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleImport(event)">
</div>

<script>
// ============================================
// MINDMAP STUDIO - Complete Application
// ============================================

const NODE_COLORS = ['#5b9aff', '#ffa845', '#51cf66', '#ff6b6b', '#cc5de8', '#ffd43b', '#20c997', '#ff8787', '#748ffc', '#69db7c'];

// State
let state = {
  folders: [],
  activeFolderId: null,
  zoom: 1,
  panX: 0,
  panY: 0,
  physicsEnabled: true,
  connectionMode: false,
  selectedNodeId: null,
  contextNodeId: null,
  draggingNode: null,
  dragOffsetX: 0,
  dragOffsetY: 0,
  isPanning: false,
  panStartX: 0,
  panStartY: 0,
  lastSaveTime: Date.now(),
  animFrame: null
};

// Canvas
let canvas, ctx, canvasWidth, canvasHeight;

// ============================================
// INITIALIZATION
// ============================================

function init() {
  canvas = document.getElementById('graphCanvas');
  ctx = canvas.getContext('2d');
  resizeCanvas();

  loadData();

  if (state.folders.length === 0) {
    createDefaultFolder();
  } else if (state.activeFolderId) {
    const exists = state.folders.find(f => f.id === state.activeFolderId);
    if (!exists) state.activeFolderId = state.folders[0].id;
  } else {
    state.activeFolderId = state.folders[0].id;
  }

  renderFolders();
  renderGraph();
  buildColorPicker();
  setupEventListeners();
  animate();
}

function resizeCanvas() {
  const area = document.getElementById('canvasArea');
  const dpr = window.devicePixelRatio || 1;
  canvasWidth = area.clientWidth;
  canvasHeight = area.clientHeight;
  canvas.width = canvasWidth * dpr;
  canvas.height = canvasHeight * dpr;
  canvas.style.width = canvasWidth + 'px';
  canvas.style.height = canvasHeight + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function createDefaultFolder() {
  const folder = {
    id: generateId(),
    name: 'Meu Mapa',
    createdAt: Date.now(),
    archived: false,
    nodes: [{
      id: generateId(),
      label: 'Ideia Central',
      description: '',
      color: '#5b9aff',
      x: 0,
      y: 0,
      vx: 0,
      vy: 0,
      radius: 28,
      pinned: false
    }],
    edges: []
  };
  state.folders.push(folder);
  state.activeFolderId = folder.id;
  saveData();
}

// ============================================
// DATA PERSISTENCE
// ============================================

function loadData() {
  try {
    const saved = localStorage.getItem('mindmap_studio_data');
    if (saved) {
      const parsed = JSON.parse(saved);
      state.folders = parsed.folders || [];
      state.activeFolderId = parsed.activeFolderId || null;
      state.zoom = parsed.zoom || 1;
      state.panX = parsed.panX || 0;
      state.panY = parsed.panY || 0;
      state.physicsEnabled = parsed.physicsEnabled !== undefined ? parsed.physicsEnabled : true;
    }
  } catch(e) {
    console.error('Error loading ', e);
  }
}

let saveTimeout = null;
function saveData() {
  document.getElementById('savingIndicator').style.display = 'flex';
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    try {
      const data = {
        folders: state.folders,
        activeFolderId: state.activeFolderId,
        zoom: state.zoom,
        panX: state.panX,
        panY: state.panY,
        physicsEnabled: state.physicsEnabled
      };
      localStorage.setItem('mindmap_studio_data', JSON.stringify(data));
      state.lastSaveTime = Date.now();
      document.getElementById('savingIndicator').style.display = 'none';
    } catch(e) {
      console.error('Error saving:', e);
      showToast('Erro ao salvar dados', 'error');
    }
  }, 300);
}

// ============================================
// FOLDER MANAGEMENT
// ============================================

function createFolder() {
  showModal('Nova Pasta', 'Nome da pasta', (name) => {
    if (!name.trim()) return;
    const folder = {
      id: generateId(),
      name: name.trim(),
      createdAt: Date.now(),
      archived: false,
      nodes: [{
        id: generateId(),
        label: name.trim(),
        description: '',
        color: '#5b9aff',
        x: 0,
        y: 0,
        vx: 0,
        vy: 0,
        radius: 28,
        pinned: false
      }],
      edges: []
    };
    state.folders.push(folder);
    state.activeFolderId = folder.id;
    saveData();
    renderFolders();
    renderGraph();
    showToast('Pasta criada!', 'success');
  });
}

function deleteFolder(id, e) {
  e.stopPropagation();
  const folder = state.folders.find(f => f.id === id);
  if (!folder) return;
  if (!confirm(`Excluir pasta "${folder.name}"?`)) return;
  state.folders = state.folders.filter(f => f.id !== id);
  if (state.activeFolderId === id) {
    state.activeFolderId = state.folders.length > 0 ? state.folders[0].id : null;
  }
  saveData();
  renderFolders();
  renderGraph();
  showToast('Pasta excluída', 'info');
}

function renameFolder(id, e) {
  e.stopPropagation();
  const folder = state.folders.find(f => f.id === id);
  if (!folder) return;
  showModal('Renomear Pasta', 'Novo nome', (name) => {
    if (!name.trim()) return;
    folder.name = name.trim();
    saveData();
    renderFolders();
  }, folder.name);
}

function selectFolder(id) {
  state.activeFolderId = id;
  state.selectedNodeId = null;
  state.connectionMode = false;
  closeDetail();
  saveData();
  renderFolders();
  renderGraph();
  closeSidebar();
}

function archiveFolder(id, e) {
  e.stopPropagation();
  const folder = state.folders.find(f => f.id === id);
  if (!folder) return;
  folder.archived = !folder.archived;
  if (folder.archived && state.activeFolderId === id) {
    const active = state.folders.find(f => !f.archived);
    state.activeFolderId = active ? active.id : null;
  }
  saveData();
  renderFolders();
  renderGraph();
  showToast(folder.archived ? 'Pasta arquivada' : 'Pasta desarquivada', 'info');
}

function getActiveFolder() {
  return state.folders.find(f => f.id === state.activeFolderId);
}

function filterFolders(query) {
  const items = document.querySelectorAll('.folder-item');
  query = query.toLowerCase();
  items.forEach(item => {
    const name = item.dataset.name.toLowerCase();
    item.style.display = name.includes(query) ? '' : 'none';
  });
}

function renderFolders() {
  const list = document.getElementById('foldersList');
  list.innerHTML = '';

  state.folders.forEach(folder => {
    const div = document.createElement('div');
    div.className = 'folder-item' + (folder.id === state.activeFolderId ? ' active' : '');
    div.dataset.name = folder.name;
    div.dataset.id = folder.id;
    div.style.opacity = folder.archived ? '0.5' : '1';

    div.innerHTML = `
      <div class="folder-name" onclick="selectFolder('${folder.id}')">
        <span class="folder-icon">${folder.archived ? '📦' : '📁'}</span>
        <span class="folder-label">${escapeHtml(folder.name)}</span>
      </div>
      <span class="folder-count">${folder.nodes.length}</span>
      <div class="folder-actions">
        <button onclick="renameFolder('${folder.id}', event)" title="Renomear">✏️</button>
        <button onclick="archiveFolder('${folder.id}', event)" title="${folder.archived ? 'Desarquivar' : 'Arquivar'}">${folder.archived ? '📦' : '️'}</button>
        <button onclick="deleteFolder('${folder.id}', event)" title="Excluir">🗑️</button>
      </div>
    `;

    list.appendChild(div);
  });

  updateStats();
}

function updateStats() {
  const folder = getActiveFolder();
  const nodes = folder ? folder.nodes.length : 0;
  const edges = folder ? folder.edges.length : 0;
  document.getElementById('statsNodes').textContent = nodes + ' nó' + (nodes !== 1 ? 's' : '');
  document.getElementById('statsEdges').textContent = edges + ' conexão' + (edges !== 1 ? 'ões' : '');
}

// ============================================
// NODE MANAGEMENT
// ============================================

function addNode(parentId) {
  const folder = getActiveFolder();
  if (!folder) { showToast('Selecione uma pasta primeiro', 'error'); return; }

  const center = screenToWorld(canvasWidth / 2, canvasHeight / 2);

  const node = {
    id: generateId(),
    label: 'Novo Nó',
    description: '',
    color: folder.nodes.length > 0 ? folder.nodes[0].color : '#5b9aff',
    x: center.x + (Math.random() - 0.5) * 100,
    y: center.y + (Math.random() - 0.5) * 100,
    vx: 0,
    vy: 0,
    radius: parentId ? 18 : 22,
    pinned: false
  };

  folder.nodes.push(node);

  if (parentId) {
    folder.edges.push({ from: parentId, to: node.id });
  }

  state.selectedNodeId = node.id;
  saveData();
  renderGraph();
  openDetail(node);
  showToast('Nó adicionado!', 'success');
}

function deleteSelectedNode() {
  if (!state.selectedNodeId) return;
  const folder = getActiveFolder();
  if (!folder) return;

  if (!confirm('Excluir este nó e suas conexões?')) return;

  folder.nodes = folder.nodes.filter(n => n.id !== state.selectedNodeId);
  folder.edges = folder.edges.filter(e => e.from !== state.selectedNodeId && e.to !== state.selectedNodeId);
  state.selectedNodeId = null;
  closeDetail();
  saveData();
  renderGraph();
  renderFolders();
  showToast('Nó excluído', 'info');
}

function archiveSelectedNode() {
  const folder = getActiveFolder();
  if (!folder || !state.selectedNodeId) return;

  const node = folder.nodes.find(n => n.id === state.selectedNodeId);
  if (!node) return;

  node.label = '📦 ' + node.label;
  node.archived = true;
  saveData();
  renderGraph();
  showToast('Nó arquivado', 'info');
}

function duplicateNode(nodeId) {
  const folder = getActiveFolder();
  if (!folder) return;
  const source = folder.nodes.find(n => n.id === nodeId);
  if (!source) return;

  const node = {
    id: generateId(),
    label: source.label + ' (cópia)',
    description: source.description,
    color: source.color,
    x: source.x + 40,
    y: source.y + 40,
    vx: 0,
    vy: 0,
    radius: source.radius,
    pinned: false
  };

  folder.nodes.push(node);
  saveData();
  renderGraph();
  showToast('Nó duplicado!', 'success');
}

function selectNode(nodeId) {
  state.selectedNodeId = nodeId;
  const folder = getActiveFolder();
  if (!folder) return;
  const node = folder.nodes.find(n => n.id === nodeId);
  if (node) {
    openDetail(node);
  }
  renderGraph();
}

function getNodeById(folder, id) {
  return folder ? folder.nodes.find(n => n.id === id) : null;
}

// ============================================
// CONNECTION MANAGEMENT
// ============================================

function startConnectionMode() {
  state.connectionMode = !state.connectionMode;
  state.selectedNodeId = null;
  closeDetail();
  renderGraph();
  if (state.connectionMode) {
    showToast('Modo conexão: clique em dois nós para conectá-los', 'info');
  }
}

function toggleConnection(nodeId) {
  const folder = getActiveFolder();
  if (!folder) return;

  if (state.connectionMode) {
    if (!state.selectedNodeId) {
      state.selectedNodeId = nodeId;
      renderGraph();
    } else {
      if (state.selectedNodeId === nodeId) {
        state.selectedNodeId = null;
        renderGraph();
        return;
      }

      const exists = folder.edges.find(e =>
        (e.from === state.selectedNodeId && e.to === nodeId) ||
        (e.from === nodeId && e.to === state.selectedNodeId)
      );

      if (exists) {
        folder.edges = folder.edges.filter(e => e !== exists);
        showToast('Conexão removida', 'info');
      } else {
        folder.edges.push({ from: state.selectedNodeId, to: nodeId });
        showToast('Nós conectados!', 'success');
      }

      state.selectedNodeId = null;
      state.connectionMode = false;
      saveData();
      renderGraph();
    }
  } else {
    selectNode(nodeId);
  }
}

// ============================================
// PHYSICS ENGINE
// ============================================

function simulatePhysics() {
  if (!state.physicsEnabled) return;
  const folder = getActiveFolder();
  if (!folder || folder.nodes.length < 2) return;

  const nodes = folder.nodes;
  const repulsion = 8000;
  const attraction = 0.008;
  const damping = 0.85;
  const centerForce = 0.001;
  const cx = 0, cy = 0;

  // Repulsion between all nodes
  for (let i = 0; i < nodes.length; i++) {
    nodes[i].vx = 0;
    nodes[i].vy = 0;
    for (let j = i + 1; j < nodes.length; j++) {
      const dx = nodes[j].x - nodes[i].x;
      const dy = nodes[j].y - nodes[i].y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const force = repulsion / (dist * dist);
      const fx = (dx / dist) * force;
      const fy = (dy / dist) * force;
      nodes[i].vx -= fx;
      nodes[i].vy -= fy;
      nodes[j].vx += fx;
      nodes[j].vy += fy;
    }
  }

  // Attraction along edges
  folder.edges.forEach(edge => {
    const a = nodes.find(n => n.id === edge.from);
    const b = nodes.find(n => n.id === edge.to);
    if (!a || !b) return;
    const dx = b.x - a.x;
    const dy = b.y - a.y;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    const force = dist * attraction;
    const fx = (dx / dist) * force;
    const fy = (dy / dist) * force;
    a.vx += fx;
    a.vy += fy;
    b.vx -= fx;
    b.vy -= fy;
  });

  // Center gravity + update
  nodes.forEach(node => {
    if (node.pinned || node === state.draggingNode) return;
    node.vx += (cx - node.x) * centerForce;
    node.vy += (cy - node.y) * centerForce;
    node.vx *= damping;
    node.vy *= damping;
    node.x += node.vx;
    node.y += node.vy;
  });
}

// ============================================
// RENDERING
// ============================================

function renderGraph() {
  ctx.clearRect(0, 0, canvasWidth, canvasHeight);

  const folder = getActiveFolder();
  if (!folder) {
    document.getElementById('emptyState').style.display = 'flex';
    return;
  }
  document.getElementById('emptyState').style.display = 'none';

  ctx.save();
  ctx.translate(canvasWidth / 2 + state.panX, canvasHeight / 2 + state.panY);
  ctx.scale(state.zoom, state.zoom);

  // Draw edges
  folder.edges.forEach(edge => {
    const from = getNodeById(folder, edge.from);
    const to = getNodeById(folder, edge.to);
    if (!from || !to) return;

    const isActive = state.connectionMode && state.selectedNodeId &&
      (state.selectedNodeId === edge.from || state.selectedNodeId === edge.to);

    ctx.beginPath();
    ctx.moveTo(from.x, from.y);
    ctx.lineTo(to.x, to.y);

    if (isActive) {
      ctx.strokeStyle = 'rgba(108, 92, 231, 0.8)';
      ctx.lineWidth = 3;
    } else {
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.12)';
      ctx.lineWidth = 1.5;
    }
    ctx.stroke();

    // Arrowhead
    const angle = Math.atan2(to.y - from.y, to.x - from.x);
    const arrowLen = 12;
    const tipX = to.x - Math.cos(angle) * (to.radius + 2);
    const tipY = to.y - Math.sin(angle) * (to.radius + 2);

    ctx.beginPath();
    ctx.moveTo(tipX, tipY);
    ctx.lineTo(tipX - arrowLen * Math.cos(angle - 0.4), tipY - arrowLen * Math.sin(angle - 0.4));
    ctx.lineTo(tipX - arrowLen * Math.cos(angle + 0.4), tipY - arrowLen * Math.sin(angle + 0.4));
    ctx.closePath();
    ctx.fillStyle = isActive ? 'rgba(108, 92, 231, 0.8)' : 'rgba(255, 255, 255, 0.12)';
    ctx.fill();
  });

  // Draw pending connection line
  if (state.connectionMode && state.selectedNodeId && state.tempMousePos) {
    const from = getNodeById(folder, state.selectedNodeId);
    if (from) {
      ctx.beginPath();
      ctx.setLineDash([5, 5]);
      ctx.moveTo(from.x, from.y);
      ctx.lineTo(state.tempMousePos.x, state.tempMousePos.y);
      ctx.strokeStyle = 'rgba(108, 92, 231, 0.5)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // Draw nodes
  folder.nodes.forEach(node => {
    const isSelected = state.selectedNodeId === node.id;
    const isConnectionTarget = state.connectionMode && state.selectedNodeId && state.selectedNodeId !== node.id;

    // Glow
    if (isSelected || isConnectionTarget) {
      ctx.beginPath();
      ctx.arc(node.x, node.y, node.radius + 8, 0, Math.PI * 2);
      const glow = ctx.createRadialGradient(node.x, node.y, node.radius, node.x, node.y, node.radius + 8);
      glow.addColorStop(0, node.color + '60');
      glow.addColorStop(1, 'transparent');
      ctx.fillStyle = glow;
      ctx.fill();
    }

    // Node body
    ctx.beginPath();
    ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);

    const grad = ctx.createRadialGradient(node.x - node.radius * 0.3, node.y - node.radius * 0.3, 0, node.x, node.y, node.radius);
    grad.addColorStop(0, lightenColor(node.color, 30));
    grad.addColorStop(1, node.color);
    ctx.fillStyle = grad;
    ctx.fill();

    // Border
    ctx.strokeStyle = isSelected ? '#ffffff' : 'rgba(255,255,255,0.2)';
    ctx.lineWidth = isSelected ? 2.5 : 1;
    ctx.stroke();

    // Archived indicator
    if (node.archived) {
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fill();
    }

    // Label
    ctx.fillStyle = isSelected ? '#ffffff' : 'rgba(255,255,255,0.9)';
    ctx.font = `${node.radius > 22 ? '600' : '500'} ${Math.max(10, node.radius * 0.55)}px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Truncate label
    let label = node.label;
    const maxChars = Math.floor(node.radius * 1.2);
    if (label.length > maxChars && node.radius <= 22) {
      label = label.substring(0, maxChars) + '…';
    }

    // Text with shadow
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 4;
    ctx.fillText(label, node.x, node.y);
    ctx.shadowBlur = 0;
  });

  ctx.restore();
}

function animate() {
  simulatePhysics();
  renderGraph();
  state.animFrame = requestAnimationFrame(animate);
}

// ============================================
// COORDINATE TRANSFORMS
// ============================================

function screenToWorld(sx, sy) {
  return {
    x: (sx - canvasWidth / 2 - state.panX) / state.zoom,
    y: (sy - canvasHeight / 2 - state.panY) / state.zoom
  };
}

function worldToScreen(wx, wy) {
  return {
    x: wx * state.zoom + canvasWidth / 2 + state.panX,
    y: wy * state.zoom + canvasHeight / 2 + state.panY
  };
}

function getNodeAtPosition(wx, wy) {
  const folder = getActiveFolder();
  if (!folder) return null;
  for (let i = folder.nodes.length - 1; i >= 0; i--) {
    const node = folder.nodes[i];
    const dx = node.x - wx;
    const dy = node.y - wy;
    if (dx * dx + dy * dy <= node.radius * node.radius + 100) {
      return node;
    }
  }
  return null;
}

// ============================================
// ZOOM & PAN
// ============================================

function setZoom(newZoom) {
  state.zoom = Math.max(0.1, Math.min(5, newZoom));
  document.getElementById('zoomLabel').textContent = Math.round(state.zoom * 100) + '%';
  saveData();
  renderGraph();
}

function zoomIn() { setZoom(state.zoom * 1.2); }
function zoomOut() { setZoom(state.zoom / 1.2); }
function resetZoom() { state.panX = 0; state.panY = 0; setZoom(1); }

function centerGraph() {
  state.panX = 0;
  state.panY = 0;
  setZoom(1);
  saveData();
}

function togglePhysics() {
  state.physicsEnabled = !state.physicsEnabled;
  document.getElementById('physicsIcon').textContent = state.physicsEnabled ? '⚡' : '⚡';
  document.getElementById('physicsIcon').style.opacity = state.physicsEnabled ? '1' : '0.4';
  saveData();
  showToast(state.physicsEnabled ? 'Física ativada' : 'Física desativada', 'info');
}

// ============================================
// EVENT LISTENERS
// ============================================

function setupEventListeners() {
  // Resize
  window.addEventListener('resize', () => {
    resizeCanvas();
    renderGraph();
  });

  // Canvas events
  canvas.addEventListener('mousedown', onMouseDown);
  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('mouseup', onMouseUp);
  canvas.addEventListener('wheel', onWheel, { passive: false });
  canvas.addEventListener('contextmenu', onContextMenu);

  // Touch events
  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd);

  // Close context menu
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.context-menu')) {
      document.getElementById('contextMenu').classList.remove('visible');
    }
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

    switch(e.key.toLowerCase()) {
      case 'n':
        e.preventDefault();
        addNode();
        break;
      case 'c':
        e.preventDefault();
        startConnectionMode();
        break;
      case 'delete':
      case 'backspace':
        if (state.selectedNodeId) {
          e.preventDefault();
          deleteSelectedNode();
        }
        break;
      case 'escape':
        state.connectionMode = false;
        state.selectedNodeId = null;
        closeDetail();
        document.getElementById('contextMenu').classList.remove('visible');
        renderGraph();
        break;
    }
  });

  // Sidebar
  document.getElementById('hamburgerBtn').addEventListener('click', openSidebar);
  document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);
}

let lastTouchDist = 0;
let lastTouchCenter = { x: 0, y: 0 };

function onMouseDown(e) {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const worldPos = screenToWorld(x, y);

  // Right click - context menu
  if (e.button === 2) return;

  const node = getNodeAtPosition(worldPos.x, worldPos.y);

  if (node) {
    if (state.connectionMode) {
      toggleConnection(node.id);
    } else {
      state.draggingNode = node;
      state.dragOffsetX = node.x - worldPos.x;
      state.dragOffsetY = node.y - worldPos.y;
      selectNode(node.id);
    }
  } else {
    if (state.connectionMode) {
      state.selectedNodeId = null;
      renderGraph();
    } else {
      state.isPanning = true;
      state.panStartX = e.clientX - state.panX;
      state.panStartY = e.clientY - state.panY;
      state.selectedNodeId = null;
      closeDetail();
      renderGraph();
    }
  }
}

function onMouseMove(e) {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const worldPos = screenToWorld(x, y);

  if (state.draggingNode) {
    state.draggingNode.x = worldPos.x + state.dragOffsetX;
    state.draggingNode.y = worldPos.y + state.dragOffsetY;
    state.draggingNode.pinned = true;
    saveData();
  } else if (state.isPanning) {
    state.panX = e.clientX - state.panStartX;
    state.panY = e.clientY - state.panStartY;
  } else if (state.connectionMode && state.selectedNodeId) {
    state.tempMousePos = worldPos;
  }
}

function onMouseUp(e) {
  if (state.draggingNode) {
    state.draggingNode.pinned = false;
    state.draggingNode = null;
    saveData();
  }
  state.isPanning = false;
  state.tempMousePos = null;
}

function onWheel(e) {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  setZoom(state.zoom * delta);
}

function onContextMenu(e) {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const worldPos = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
  const node = getNodeAtPosition(worldPos.x, worldPos.y);

  if (node) {
    state.contextNodeId = node.id;
    const menu = document.getElementById('contextMenu');
    menu.style.left = e.clientX + 'px';
    menu.style.top = e.clientY + 'px';
    menu.classList.add('visible');
  } else {
    document.getElementById('contextMenu').classList.remove('visible');
  }
}

function onTouchStart(e) {
  e.preventDefault();
  const touches = e.touches;

  if (touches.length === 1) {
    const rect = canvas.getBoundingClientRect();
    const x = touches[0].clientX - rect.left;
    const y = touches[0].clientY - rect.top;
    const worldPos = screenToWorld(x, y);

    const node = getNodeAtPosition(worldPos.x, worldPos.y);

    if (node) {
      if (state.connectionMode) {
        toggleConnection(node.id);
      } else {
        state.draggingNode = node;
        state.dragOffsetX = node.x - worldPos.x;
        state.dragOffsetY = node.y - worldPos.y;
        selectNode(node.id);
      }
    } else {
      state.isPanning = true;
      state.panStartX = touches[0].clientX - state.panX;
      state.panStartY = touches[0].clientY - state.panY;
      state.selectedNodeId = null;
      closeDetail();
      renderGraph();
    }
  } else if (touches.length === 2) {
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    lastTouchDist = Math.sqrt(dx * dx + dy * dy);
    lastTouchCenter = {
      x: (touches[0].clientX + touches[1].clientX) / 2,
      y: (touches[0].clientY + touches[1].clientY) / 2
    };
  }
}

function onTouchMove(e) {
  e.preventDefault();
  const touches = e.touches;

  if (touches.length === 1) {
    const rect = canvas.getBoundingClientRect();
    const x = touches[0].clientX - rect.left;
    const y = touches[0].clientY - rect.top;
    const worldPos = screenToWorld(x, y);

    if (state.draggingNode) {
      state.draggingNode.x = worldPos.x + state.dragOffsetX;
      state.draggingNode.y = worldPos.y + state.dragOffsetY;
      state.draggingNode.pinned = true;
      saveData();
    } else if (state.isPanning) {
      state.panX = touches[0].clientX - state.panStartX;
      state.panY = touches[0].clientY - state.panStartY;
    }
  } else if (touches.length === 2) {
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (lastTouchDist > 0) {
      const scale = dist / lastTouchDist;
      setZoom(state.zoom * scale);

      const cx = (touches[0].clientX + touches[1].clientX) / 2;
      const cy = (touches[0].clientY + touches[1].clientY) / 2;
      const dcx = cx - lastTouchCenter.x;
      const dcy = cy - lastTouchCenter.y;
      state.panX += dcx;
      state.panY += dcy;
      lastTouchCenter = { x: cx, y: cy };
    }

    lastTouchDist = dist;
  }
}

function onTouchEnd(e) {
  if (state.draggingNode) {
    state.draggingNode.pinned = false;
    state.draggingNode = null;
    saveData();
  }
  state.isPanning = false;
  lastTouchDist = 0;
}

// ============================================
// CONTEXT MENU ACTIONS
// ============================================

function contextEditNode() {
  document.getElementById('contextMenu').classList.remove('visible');
  if (state.contextNodeId) selectNode(state.contextNodeId);
}

function contextAddChild() {
  document.getElementById('contextMenu').classList.remove('visible');
  if (state.contextNodeId) addNode(state.contextNodeId);
}

function contextDuplicate() {
  document.getElementById('contextMenu').classList.remove('visible');
  if (state.contextNodeId) duplicateNode(state.contextNodeId);
}

function contextArchiveNode() {
  document.getElementById('contextMenu').classList.remove('visible');
  if (state.contextNodeId) {
    state.selectedNodeId = state.contextNodeId;
    archiveSelectedNode();
  }
}

function contextDeleteNode() {
  document.getElementById('contextMenu').classList.remove('visible');
  if (state.contextNodeId) {
    state.selectedNodeId = state.contextNodeId;
    deleteSelectedNode();
  }
}

// ============================================
// EXPORT / IMPORT
// ============================================

function exportBackup() {
  const data = {
    version: '1.0',
    exportDate: new Date().toISOString(),
    folders: state.folders,
    activeFolderId: state.activeFolderId
  };

  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `mindmap-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Backup exportado!', 'success');
}

function exportFolderJSON() {
  const folder = getActiveFolder();
  if (!folder) { showToast('Selecione uma pasta', 'error'); return; }

  const blob = new Blob([JSON.stringify(folder, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${folder.name.replace(/[^a-zA-Z0-9]/g, '_')}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Mapa exportado!', 'success');
}

function importBackup() {
  document.getElementById('fileInput').click();
}

function handleImport(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);

      if (data.version === '1.0') {
        // Full backup
        if (data.folders && Array.isArray(data.folders)) {
          state.folders = data.folders;
          state.activeFolderId = data.activeFolderId || state.folders[0]?.id;
        }
      } else if (data.nodes && data.edges !== undefined) {
        // Single folder import
        const folder = {
          id: generateId(),
          name: file.name.replace('.json', ''),
          createdAt: Date.now(),
          archived: false,
          nodes: data.nodes,
          edges: data.edges
        };
        state.folders.push(folder);
        state.activeFolderId = folder.id;
      } else {
        showToast('Formato de arquivo inválido', 'error');
        return;
      }

      saveData();
      renderFolders();
      renderGraph();
      showToast('Dados importados com sucesso!', 'success');
    } catch(err) {
      console.error(err);
      showToast('Erro ao importar arquivo', 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ============================================
// UI HELPERS
// ============================================

function showModal(title, placeholder, onConfirm, defaultValue) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalInput').placeholder = placeholder;
  document.getElementById('modalInput').value = defaultValue || '';
  document.getElementById('modalOverlay').classList.add('visible');
  document.getElementById('modalInput').focus();

  const confirmBtn = document.getElementById('modalConfirm');
  confirmBtn.onclick = () => {
    const value = document.getElementById('modalInput').value;
    closeModal();
    onConfirm(value);
  };

  document.getElementById('modalInput').onkeydown = (e) => {
    if (e.key === 'Enter') confirmBtn.click();
    if (e.key === 'Escape') closeModal();
  };
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('visible');
}

function showToast(message, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  const icons = { success: '✅', error: '❌', info: 'ℹ️' };
  toast.innerHTML = `<span>${icons[type] || ''}</span> ${message}`;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('visible');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('visible');
}

// ============================================
// UTILITIES
// ============================================

function generateId() {
  return 'n_' + Math.random().toString(36).substr(2, 9) + Date.now().toString(36);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function lightenColor(hex, percent) {
  const num = parseInt(hex.replace('#', ''), 16);
  const r = Math.min(255, (num >> 16) + percent);
  const g = Math.min(255, ((num >> 8) & 0x00FF) + percent);
  const b = Math.min(255, (num & 0x0000FF) + percent);
  return `rgb(${r},${g},${b})`;
}
